name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build_mode: none
            runner: ubuntu-latest
          - language: go
            build_mode: autobuild
            runner: ubuntu-latest
          - language: java-kotlin
            build_mode: none
            runner: ubuntu-latest
          - language: javascript-typescript
            build_mode: none
            runner: ubuntu-latest
          - language: python
            build_mode: none
            runner: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Swift and C# are intentionally omitted here. In this repository they only
      # appear in shipped template assets, and default setup fails trying to treat
      # those templates as buildable code.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build_mode }}

      - name: Autobuild
        if: matrix.build_mode == 'autobuild'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
